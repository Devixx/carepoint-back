name: Deploy Backend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: devixx/carepoint-back

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_IP }}
          username: ubuntu
          key: ${{ secrets.GCP_SSH_KEY }}
          timeout: 60s
          command_timeout: 20m
          envs: GHCR_USER,GHCR_TOKEN,DOMAIN_NAME,LETSENCRYPT_EMAIL,DUCKDNS_TOKEN
          script: |
            set -euo pipefail

            PROJECT_DIR="/home/ubuntu/carepoint"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # ---------------------------------------------------------------
            # Best-effort: ensure GCP firewall allows HTTP/HTTPS.
            # Requires the VM's service account to have compute.firewalls.create.
            # If it doesn't, this silently no-ops and you must run setup-firewall.sh
            # locally with gcloud (see gcp-ready-config/setup-firewall.sh).
            # ---------------------------------------------------------------
            if command -v gcloud >/dev/null 2>&1; then
              gcloud compute firewall-rules create carepoint-allow-http \
                --allow=tcp:80 --source-ranges=0.0.0.0/0 \
                --description="Allow HTTP for CarePoint" --quiet 2>/dev/null || true
              gcloud compute firewall-rules create carepoint-allow-https \
                --allow=tcp:443 --source-ranges=0.0.0.0/0 \
                --description="Allow HTTPS for CarePoint" --quiet 2>/dev/null || true
            fi

            # Write docker-compose.yaml (canonical version owned by backend deploy)
            cat > docker-compose.yaml << 'COMPOSE_EOF'
            services:
              db:
                image: postgres:15-alpine
                container_name: carepoint-db
                restart: always
                environment:
                  POSTGRES_USER: ${POSTGRES_USER:-postgres}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
                  POSTGRES_DB: ${POSTGRES_DB:-carepoint_db}
                volumes:
                  - db_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                logging:
                  driver: "json-file"
                  options: { max-size: "10m", max-file: "3" }

              backend:
                image: ghcr.io/devixx/carepoint-back:latest
                container_name: carepoint-api
                restart: always
                environment:
                  DB_HOST: db
                  DB_PORT: 5432
                  DB_USERNAME: ${POSTGRES_USER:-postgres}
                  DB_PASSWORD: ${POSTGRES_PASSWORD:-password123}
                  DB_NAME: ${POSTGRES_DB:-carepoint_db}
                  PORT: 3001
                  NODE_ENV: production
                  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
                depends_on:
                  db:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ready || exit 1"]
                  interval: 15s
                  timeout: 5s
                  retries: 6
                  start_period: 30s
                logging:
                  driver: "json-file"
                  options: { max-size: "10m", max-file: "3" }

              seeder:
                image: ghcr.io/devixx/carepoint-back:latest
                container_name: carepoint-seeder
                restart: "no"
                command: node dist/database/seed.js
                environment:
                  DB_HOST: db
                  DB_PORT: 5432
                  DB_USERNAME: ${POSTGRES_USER:-postgres}
                  DB_PASSWORD: ${POSTGRES_PASSWORD:-password123}
                  DB_NAME: ${POSTGRES_DB:-carepoint_db}
                  NODE_ENV: production
                  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
                depends_on:
                  backend:
                    condition: service_healthy
                logging:
                  driver: "json-file"
                  options: { max-size: "10m", max-file: "3" }

              doctor-portal:
                image: ghcr.io/devixx/carepoint-front:latest
                container_name: carepoint-doctor
                restart: always
                environment:
                  NEXT_PUBLIC_API_URL: https://${DOMAIN_NAME}/api
                  NODE_ENV: production
                logging:
                  driver: "json-file"
                  options: { max-size: "10m", max-file: "3" }

              patient-portal:
                image: ghcr.io/devixx/carepoint-patient:latest
                container_name: carepoint-patient
                restart: always
                environment:
                  NEXT_PUBLIC_API_URL: https://${DOMAIN_NAME}/api
                  NODE_ENV: production
                logging:
                  driver: "json-file"
                  options: { max-size: "10m", max-file: "3" }

              caddy:
                image: caddy:alpine
                container_name: carepoint-caddy
                restart: always
                ports:
                  - "80:80"
                  - "443:443"
                environment:
                  DOMAIN_NAME: ${DOMAIN_NAME}
                  LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile
                  - caddy_data:/data
                  - caddy_config:/config
                depends_on:
                  - doctor-portal
                  - patient-portal
                  - backend
                logging:
                  driver: "json-file"
                  options: { max-size: "10m", max-file: "3" }

            volumes:
              db_data:
              caddy_data:
              caddy_config:
            COMPOSE_EOF

            # Write Caddyfile (patient now correctly on 3002)
            cat > Caddyfile << 'CADDY_EOF'
            {
                email {$LETSENCRYPT_EMAIL}
            }

            {$DOMAIN_NAME} {
                handle /api/* {
                    uri strip_prefix /api
                    reverse_proxy backend:3001
                }
                handle /doctor/* {
                    reverse_proxy doctor-portal:3000
                }
                handle /patient/* {
                    reverse_proxy patient-portal:3002
                }
                handle / {
                    redir /patient
                }
                encode gzip
            }
            CADDY_EOF

            # Update DuckDNS with this VM's external IP
            EXTERNAL_IP=$(curl -s -H "Metadata-Flavor: Google" \
              http://metadata.google.internal/computeMetadata/v1/instance/network-interfaces/0/access-configs/0/external-ip \
              || curl -s ifconfig.me)
            curl -s "https://www.duckdns.org/update?domains=carepoint&token=${{ secrets.DUCKDNS_TOKEN }}&ip=${EXTERNAL_IP}"

            # Create/Update .env file
            cat > .env << ENV_EOF
            DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
            LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=password123
            POSTGRES_DB=carepoint_db
            JWT_SECRET=carepoint-secret-123
            ENV_EOF

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull and start. No --force-recreate: compose only restarts services
            # whose image digest actually changed (so DB stays up across deploys).
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
